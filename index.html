<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS + Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>GitHub Issues Tracker</title>
  </head>
  <body class="min-h-screen flex items-center justify-center">
    <!-- Login -->
    <section class="max-w-[520px] mx-auto shadow-2xl rounded-lg p-[15px]">
      <!-- Form Heading -->
      <div class="text-center mb-[24px]">
        <img class="mx-auto" src="./assets/github-logo.png" alt="github-logo" />
        <h2 class="text-[1.5rem] font-semibold">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>
      <!-- Form Body -->
      <fieldset
        class="fieldset bg-white border-none mx-auto rounded-box w-xs border p-4"
      >
        <label class="label">Email</label>
        <input type="email" class="input width-full" placeholder="Email" />
        <p class="text-[#4A00FF] font-semibold">Default : admin</p>

        <label class="label">Password</label>
        <input type="password" class="input width-full" placeholder="Password" />
        <p class="text-[#4A00FF] font-semibold">Default : admin123</p>

        <button id="sign-in-btn" class="btn btn-primary mt-4">Sign In</button>
      </fieldset>
    </section>
  </body>
</html>
