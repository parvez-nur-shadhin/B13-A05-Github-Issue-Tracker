<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS + Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>Homepage</title>
  </head>
  <body class="p-5">

    <!-- NavBar Section -->
    <section>
      <div
        class="navbar bg-base-100 shadow-sm flex flex-col md:flex-row gap-2 items-center justify-center md:justify-between"
      >
        <!-- Navbar Start -->
        <div class="flex-1 flex gap-2">
          <img
            class="w-[36px] h-[35px]"
            src="./assets/github-logo.png"
            alt=""
          />
          <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
          <input
            id="search-input"
            type="text"
            placeholder="Search issues..."
            class="input input-bordered w-full md:w-auto"
          />

          <!-- Navbar button -->
          <button id="search-btn" class="btn btn-outline btn-primary">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </section>

    <!-- Head Toggle Buttons -->
    <section
      class="max-w-[1110px] p-[24px] rounded-lg flex gap-5 mt-4 shadow-lg mx-auto items-center sticky justify-center md:justify-start z-1"
    >
      <button id="all" onclick="loadPost('all')" class="btn btn-outline">
        All
      </button>
      <button id="open" onclick="loadOpen('open')" class="btn btn-outline">
        Open
      </button>
      <button
        id="closed"
        onclick="loadClosed('closed')"
        class="btn btn-outline"
      >
        Closed
      </button>
    </section>

    <!-- Post Section -->
    <section class="max-w-[1110px] mx-auto shadow-2xl rounded-lg mt-4">
      <!-- Post Heading -->
      <div
        class="flex flex-col md:flex-row gap-5 justify-between items-center p-4 border-b-2 border-b-gray-400 rounded-md"
      >
        <!-- left side -->
        <div class="flex gap-2 items-center justify-center">
          <img src="./assets/Aperture.png" alt="Aperture" />
          <!-- left Text -->
          <div>
            <h1 class="text-[1.25rem] font-semibold">
              <span id="post-count">50</span> Issues
            </h1>
            <p>Track and manage your project issues</p>
          </div>
        </div>
        <!-- Right Side -->
        <div class="flex gap-4">
          <!-- open -->
          <div>
            <h1>
              <i class="fa-solid fa-circle" style="color: rgb(14, 202, 0)"></i>
              Open
            </h1>
          </div>
          <!-- Closed -->
          <div>
            <h1>
              <i
                class="fa-solid fa-circle"
                style="color: rgb(168, 85, 247)"
              ></i>
              Closed
            </h1>
          </div>
        </div>
      </div>

      <!-- post Container -->
      <section
        id="post-container"
        class="bg-base-300 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 p-[24px]"
      ></section>
    </section>

    <!-- Spinner -->
    <section
      id="spinner-container"
      class="max-w-[1110px] mx-auto text-center pt-20 pb-20 hidden"
    >
      <span class="loading loading-spinner loading-xl"></span>
    </section>

    <!-- Modal -->
    <section>
      <!-- Open the modal using ID.showModal() method -->
      <dialog
        id="issue-details-modal"
        class="modal modal-bottom sm:modal-middle"
      >
        <div class="modal-box p-[32px] space-y-5">
          <div>
            <h1 id="modal-title" class="text-[1.5rem] font-bold">
              Fix broken image uploads
            </h1>
            <div class="flex gap-3 items-center">
              <h1
                id="modal-status"
                class="text-[12px] font-medium bg-green-600 text-white px-2 rounded-full"
              >
                opened
              </h1>
              <p class="text-[0.75rem] text-[#64748B]">
                Opened by <span id="modal-name">Fahim Ahmed</span>
              </p>
              <p id="modal-date" class="text-[0.755rem] text-[#64748B]">
                22/02/2026
              </p>
            </div>
          </div>
          <div>
            <p id="modal-description" class="text-[#64748B]">
              The navigation menu doesn't collapse properly on mobile devices.
              Need to fix the responsive behavior.
            </p>
          </div>
          <div id="modal-label-container" class="mt-3 mb-3">

          </div>
          <div
            class="bg-[#F8FAFC] flex flex-1 justify-between items-center rounded-sm py-3 px-10"
          >
            <div>
              <p class="text-[#64748B]">Assignee:</p>
              <h2 id="modal-assignee" class="font-semibold">Fahim Ahmed</h2>
            </div>
            <div>
              <p class="text-[#64748B]">Priority:</p>
              <div>
                <h1 id="modal-priority">High</h1>
              </div>
            </div>
          </div>
          <div class="modal-action">
            <form method="dialog">
              <!-- if there is a button in form, it will close the modal -->
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </section>

    <!-- Scripts -->
    <script src="./scripts/hompage.js"></script>
  </body>
</html>
